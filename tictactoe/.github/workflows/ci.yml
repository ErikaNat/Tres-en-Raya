name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  test:
    name: Lint, Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test with coverage
        run: npm test

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  deploy:
    name: Deploy to production
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Build
        run: npm run build

      # ── Render.com ──────────────────────────────────────────────────────────
      # Descomenta si usas Render. Crea el secreto RENDER_DEPLOY_HOOK_URL en
      # Settings > Secrets and variables > Actions de tu repo.
      #
      # - name: Deploy to Render
      #   run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

      # ── Railway ─────────────────────────────────────────────────────────────
      # Descomenta si usas Railway. Crea RAILWAY_TOKEN en los secretos.
      #
      # - name: Deploy to Railway
      #   uses: bervProject/railway-deploy@main
      #   with:
      #     railway_token: ${{ secrets.RAILWAY_TOKEN }}
      #     service: tictactoe

      - name: Deployment ready
        run: echo "Build successful. Enable a deploy step above for your platform."
